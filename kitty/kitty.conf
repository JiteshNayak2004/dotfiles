# Performance
repaint_delay                   6
input_delay                     1
sync_to_monitor                 no

# Font settings
font_family			JetBrainsMono NF Bold
font_features			auto 
bold_font			auto 
italic_font                     auto
bold_italic_font                auto
font_size                       12
disable_ligatures               never
# adjust_line_height              1

# Mouse
copy_on_select                  yes
strip_trailing_spaces           always

# Cursor
cursor_shape                    beam
cursor_blink_interval           0
cursor_beam_thickness		1.5

# scrollback
scrollback_lines		200
wheel_scroll_multiplier		50
wheel_scroll_min_lines		1
touch_scroll_multiplier		5
# Window layout
window_border_width             1px
hide_window_decorations         yes

# Bell
enable_audio_bell               no
window_alert_on_bell            yes
bell_on_tab                     no

# # Tab Bar
# tab_bar_edge                    bottom
# tab_bar_style                   powerline
# tab_powerline_style             angled
# tab_bar_min_tabs                1
# tab_bar_align                   left

# Advance
shell_integration               enabled no-cursor
update_check_interval           0

# Nord Colorscheme for Kitty
# Based on:
# - https://gist.github.com/marcusramberg/64010234c95a93d953e8c79fdaf94192
# - https://github.com/arcticicestudio/nord-hyper

foreground              #e0def4
background              #12121e
selection_foreground    #12121e
selection_background    #FFFACD
url_color               #9ccfd8
cursor                  #cccccc

# black
color0   #3B4252
color8   #4C566A

# red
color1   #FF789E
color9   #FF789E

# green
color2   #A3BE8C
color10  #A3BE8C

# yellow
color3   #f6c177
color11  #f6c177

# blue
color4  #81A1C1
color12 #81A1C1

# magenta
color5   #c4a7e7
color13  #c4a7e7

# cyan
color6   #9ccfd8
color14  #8FBCBB

# white
color7   #E5E9F0
color15  #ECEFF4

# Windows
active_border_color     #f6c177
inactive_border_color   #12121e



# Tabs
tab_bar_style powerline
tab_powerline_style slanted
tab_bar_margin_height 8 0
window_padding_width 5 0 0 5

# use ctrl+tab to traverse tabs
# using ctrl+shift+(right or left ) arrow keys also moves thru tabs
